<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A Space Invaders style game built with HTML, CSS, and JavaScript.">
    <meta name="author" content="Nathan Cross">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/games/images/space_icon.png">
</head>

<body>
    <main class="game-page">
        <section class="game-card">

            <div class="top-bar">
                <div>
                    <p class="label">JavaScript Game</p>
                    <h1>Space Invaders</h1>
                </div>

                <div class="stats">
                    <div>
                        <p>Score</p>
                        <h2 id="score">0</h2>
                    </div>

                    <div>
                        <p>Lives</p>
                        <h2 id="lives">3</h2>
                    </div>

                    <div>
                        <p>Wave</p>
                        <h2 id="wave">1</h2>
                    </div>

                    <div>
                        <p>Power</p>
                        <h2 id="power">None</h2>
                    </div>
                </div>
            </div>

            <canvas id="game" width="800" height="500"></canvas>

            <div id="messageBox" class="message-box">
                <h2 id="messageTitle"></h2>
                <p id="messageText"></p>
            </div>

            <div class="controls">
                <button id="startBtn">Start Game</button>
                <button id="restartBtn">Restart</button>
            </div>

            <p class="instructions">
                Move with A/D or arrows. Shoot with Space. Catch power-ups. Boss wave every 3 waves.
            </p>

            <a href="https://nathancross-hub.github.io/games/games/index.html" class="back-link">
                ← Back to JavaScript Games
            </a>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
